services:
  register-console:
    image: maishanhub/mregister:main
    container_name: register-console
    ports:
      - "8000:8000"
    environment:
      WEB_CONSOLE_MAX_CONCURRENT_TASKS: "2"
      WEB_CONSOLE_POLL_INTERVAL: "1.0"
    volumes:
      - ./web_console/runtime:/app/web_console/runtime
    restart: unless-stopped
